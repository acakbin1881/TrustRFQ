<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OTC Desk — RFQ negotiation</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Hanken+Grotesk:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }
    ::selection { background: rgba(229, 181, 103, 0.3); }
    input::placeholder { color: rgba(255, 255, 255, 0.3); }

    body {
      width: 100%;
      min-height: 100vh;
      background: #000000;
      font-family: 'Hanken Grotesk', sans-serif;
      color: #fff;
    }

    /* ===== nav ===== */
    .nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 22px 48px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      gap: 18px;
      flex-wrap: wrap;
    }
    .nav__left { display: flex; align-items: center; gap: 14px; }
    .nav__home {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: rgba(255, 255, 255, 0.6);
      text-decoration: none;
      font-size: 14px;
    }
    .nav__home:hover { color: rgba(255, 255, 255, 0.9); }
    .nav__divider { width: 1px; height: 18px; background: rgba(255, 255, 255, 0.12); }
    .nav__brand {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 18px;
      letter-spacing: -0.3px;
    }
    .nav__right { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .nav__chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid rgba(229, 181, 103, 0.28);
      background: rgba(229, 181, 103, 0.06);
    }
    .nav__chip-dot { width: 6px; height: 6px; border-radius: 50%; background: #E5B567; }
    .nav__chip-text { color: #E5B567; font-size: 12px; font-weight: 600; letter-spacing: 0.3px; }

    /* role switch + identity */
    .role-toggle {
      display: inline-grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      padding: 4px;
      background: #000;
      border-radius: 10px;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .role-btn {
      padding: 8px 20px;
      border-radius: 7px;
      border: none;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      background: transparent;
      color: rgba(255, 255, 255, 0.55);
      transition: all .15s;
    }
    .role-btn.is-active { background: #E5B567; color: #0a0a0c; }
    .identity { display: inline-flex; align-items: center; gap: 10px; }
    .identity__badge {
      width: 32px; height: 32px; border-radius: 9px;
      background: rgba(229, 181, 103, 0.1);
      border: 1px solid rgba(229, 181, 103, 0.2);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Space Grotesk', sans-serif; font-size: 12px; font-weight: 600; color: #E5B567;
    }
    .name-input {
      padding: 8px 12px; border-radius: 9px; background: #000;
      border: 1px solid rgba(255, 255, 255, 0.12); color: #fff;
      font-size: 13px; font-family: 'Hanken Grotesk', sans-serif; outline: none; width: 150px;
    }
    .name-input:focus { border-color: rgba(229, 181, 103, 0.5); }
    .conn { display: inline-flex; align-items: center; gap: 7px; color: rgba(255,255,255,0.45); font-size: 12px; }
    .conn__dot { width: 7px; height: 7px; border-radius: 50%; background: rgba(255,255,255,0.25); transition: background .2s; }
    .conn__dot.is-on { background: #4ade80; box-shadow: 0 0 8px rgba(74,222,128,0.6); }

    /* ===== page ===== */
    .page { max-width: 1100px; margin: 0 auto; padding: 56px 48px 100px; }

    .page__title {
      margin: 0;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 40px;
      letter-spacing: -1px;
    }
    .page__subtitle {
      margin: 14px 0 0;
      color: rgba(255, 255, 255, 0.55);
      font-size: 17px;
      max-width: 620px;
      line-height: 1.6;
    }

    .grid {
      display: grid;
      grid-template-columns: 0.85fr 1.15fr;
      gap: 24px;
      margin-top: 48px;
      align-items: start;
    }

    .panel {
      padding: 32px;
      border-radius: 18px;
      background: #0a0a0c;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .panel--offers { min-height: 420px; }

    .panel__label {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      color: rgba(255, 255, 255, 0.5);
    }

    /* side toggle */
    .side-toggle {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 24px;
      padding: 5px;
      background: #000;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.07);
    }
    .side-btn {
      padding: 12px;
      border-radius: 9px;
      border: none;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      font-weight: 600;
      transition: all .15s;
      background: transparent;
      color: rgba(255, 255, 255, 0.55);
    }
    .side-btn.is-active { background: #E5B567; color: #0a0a0c; }

    /* fields */
    .field { margin-top: 24px; }
    .field__label { color: rgba(255, 255, 255, 0.5); font-size: 13px; font-weight: 500; }
    .field__input {
      width: 100%;
      margin-top: 10px;
      padding: 16px 18px;
      border-radius: 12px;
      background: #000;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #fff;
      font-size: 22px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      outline: none;
      transition: border-color .15s;
    }
    .field__input:focus { border-color: rgba(229, 181, 103, 0.5); }
    .field__hint { margin-top: 10px; font-size: 13px; color: rgba(255,255,255,0.4); }

    .ttl-select {
      width: 100%; margin-top: 10px; padding: 14px;
      border-radius: 12px; background: #000;
      border: 1px solid rgba(255, 255, 255, 0.1); color: #fff;
      font-family: 'Hanken Grotesk', sans-serif; font-size: 14px; outline: none;
    }

    /* primary action button */
    .btn-request {
      width: 100%;
      margin-top: 24px;
      padding: 16px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 600;
      background: #E5B567;
      color: #0a0a0c;
      transition: opacity .15s;
    }
    .btn-request.is-busy, .btn-request:disabled { opacity: 0.6; pointer-events: none; }

    /* token dropdowns (taker ticket) */
    .token-select {
      width: 100%; margin-top: 10px; padding: 16px 18px;
      border-radius: 12px; background: #000;
      border: 1px solid rgba(255, 255, 255, 0.1); color: #fff;
      font-family: 'Space Grotesk', sans-serif; font-size: 18px; font-weight: 600;
      outline: none; cursor: pointer; transition: border-color .15s;
    }
    .token-select:focus { border-color: rgba(229, 181, 103, 0.5); }

    /* dual ticket actions (quote vs firm order) */
    .ticket-actions { display: grid; gap: 10px; margin-top: 24px; }
    .ticket-actions .btn-request { margin-top: 0; }
    .btn-quote {
      width: 100%; padding: 16px; border-radius: 12px; cursor: pointer;
      font-family: 'Space Grotesk', sans-serif; font-size: 16px; font-weight: 600;
      background: transparent; color: #E5B567;
      border: 1px solid rgba(229, 181, 103, 0.45); transition: background .15s;
    }
    .btn-quote:hover { background: rgba(229, 181, 103, 0.08); }
    .btn-quote.is-busy, .btn-quote:disabled { opacity: 0.6; pointer-events: none; }

    /* signed-order badge */
    .order-badge {
      margin-top: 14px; display: inline-flex; align-items: center; gap: 8px;
      padding: 7px 13px; border-radius: 9px;
      border: 1px solid rgba(229, 181, 103, 0.28); background: rgba(229, 181, 103, 0.06);
      color: #E5B567; font-size: 12px; font-family: 'Space Grotesk', sans-serif;
      letter-spacing: 0.2px; word-break: break-all;
    }

    /* quote/order kind tag */
    .kind-tag {
      display: inline-flex; padding: 3px 9px; border-radius: 6px;
      font-size: 10px; font-weight: 700; letter-spacing: 0.6px; vertical-align: middle;
    }
    .kind-tag--quote { background: rgba(255, 255, 255, 0.08); color: rgba(255, 255, 255, 0.6); }
    .kind-tag--order { background: rgba(229, 181, 103, 0.16); color: #E5B567; }

    /* Oracle: maker price suggestion */
    .oracle-suggest {
      margin-top: 24px; padding: 13px 15px; border-radius: 11px;
      border: 1px solid rgba(229, 181, 103, 0.22); background: rgba(229, 181, 103, 0.05);
    }
    .oracle-suggest__main {
      font-family: 'Space Grotesk', sans-serif; font-size: 12px; color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.2px;
    }
    .oracle-suggest__row {
      display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-top: 8px;
    }
    .oracle-suggest__row span {
      font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 600; color: #E5B567;
    }
    .btn-oracle {
      flex: 0 0 auto; padding: 7px 16px; border-radius: 8px; cursor: pointer;
      font-family: 'Space Grotesk', sans-serif; font-size: 13px; font-weight: 600;
      background: transparent; color: #E5B567; border: 1px solid rgba(229, 181, 103, 0.45);
      transition: background .15s;
    }
    .btn-oracle:hover { background: rgba(229, 181, 103, 0.12); }

    /* Oracle: taker fairness verdict on an offer */
    .oracle-check {
      margin-top: 12px; display: inline-flex; align-items: center;
      padding: 6px 12px; border-radius: 8px; font-size: 12px; font-weight: 600;
      font-family: 'Space Grotesk', sans-serif; letter-spacing: 0.2px;
    }
    .oracle-check.is-ok   { background: rgba(74, 222, 128, 0.13); color: #4ade80; }
    .oracle-check.is-warn { background: rgba(229, 181, 103, 0.14); color: #E5B567; }

    /* offers header */
    .offers__head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .offers__status { color: rgba(255, 255, 255, 0.4); font-size: 13px; }
    .oracle-chip {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 5px 11px; border-radius: 999px;
      border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03);
      color: rgba(255,255,255,0.65); font-size: 12px;
    }
    .oracle-chip b { color: #E5B567; font-family: 'Space Grotesk', sans-serif; }

    /* centered states */
    .state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 320px;
      text-align: center;
    }
    .state__icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255, 255, 255, 0.4);
      font-size: 24px;
    }
    .state__text {
      margin: 20px 0 0;
      color: rgba(255, 255, 255, 0.45);
      font-size: 15px;
      max-width: 300px;
      line-height: 1.6;
    }
    .state__loading-title {
      color: #E5B567;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 15px;
      letter-spacing: 0.5px;
    }
    .state__loading-sub { margin: 12px 0 0; color: rgba(255, 255, 255, 0.4); font-size: 14px; }

    /* lists */
    .offers__list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 22px;
    }
    .offer {
      padding: 18px;
      border-radius: 14px;
      transition: all .15s;
      background: #000;
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
    .offer.is-clickable { cursor: pointer; }
    .offer.is-clickable:hover { border-color: rgba(229, 181, 103, 0.3); }
    .offer.is-best { border-color: rgba(229, 181, 103, 0.4); background: rgba(229, 181, 103, 0.05); }
    .offer.is-expired { opacity: 0.5; }
    .offer__row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .offer__maker { display: flex; align-items: center; gap: 12px; }
    .offer__avatar {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: rgba(229, 181, 103, 0.1);
      border: 1px solid rgba(229, 181, 103, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: #E5B567;
    }
    .offer__name { font-size: 15px; font-weight: 600; color: #fff; }
    .offer__meta { font-size: 12px; color: rgba(255, 255, 255, 0.4); margin-top: 2px; }
    .offer__meta .bps-pos { color: #4ade80; }
    .offer__meta .bps-neg { color: #f87171; }
    .offer__priceblock { text-align: right; }
    .offer__price {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }
    .offer__total { font-size: 12px; color: rgba(255, 255, 255, 0.45); }
    .offer__best {
      margin-top: 12px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(229, 181, 103, 0.14);
      color: #E5B567;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.3px;
    }

    /* per-card actions */
    .offer__actions { display: flex; gap: 10px; margin-top: 14px; }
    .btn-accept {
      flex: 1; padding: 12px; border-radius: 10px; border: none; cursor: pointer;
      font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 14px;
      background: #E5B567; color: #0a0a0c;
    }
    .btn-accept:disabled, .btn-accept.is-disabled { opacity: 0.4; pointer-events: none; }
    .btn-counter {
      padding: 12px 16px; border-radius: 10px; cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.16); background: rgba(255, 255, 255, 0.05); color: #fff;
      font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 14px;
    }
    .btn-counter:hover { background: rgba(255,255,255,0.1); }
    .counter-box { margin-top: 12px; display: flex; gap: 10px; }
    .counter-box input {
      flex: 1; padding: 11px 13px; border-radius: 9px; background: #000;
      border: 1px solid rgba(255, 255, 255, 0.14); color: #fff;
      font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 600; outline: none;
    }
    .counter-box input:focus { border-color: rgba(229, 181, 103, 0.5); }
    .waiting { color: rgba(255, 255, 255, 0.45); font-size: 13px; margin-top: 14px; text-align: center; }

    /* maker negotiation thread */
    .thread-list { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
    .thread-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 14px; border-radius: 10px; background: #000;
      border: 1px solid rgba(255, 255, 255, 0.06);
    }
    .thread-row.is-standing { border-color: rgba(229, 181, 103, 0.3); }
    .thread-from {
      font-size: 11px; letter-spacing: 0.4px; font-weight: 600;
      text-transform: uppercase; color: rgba(255, 255, 255, 0.45);
    }
    .thread-price { font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 16px; }
    .rfq-summary {
      margin-top: 8px; padding: 16px; border-radius: 12px;
      background: #000; border: 1px solid rgba(255,255,255,0.08);
    }
    .rfq-summary__amt { font-family: 'Space Grotesk', sans-serif; font-size: 22px; font-weight: 600; }
    .rfq-summary__meta { color: rgba(255,255,255,0.45); font-size: 13px; margin-top: 4px; }

    .badge-status { display: inline-flex; padding: 4px 11px; border-radius: 999px; font-size: 11px; font-weight: 600; letter-spacing: 0.3px; }
    .badge-accepted { background: rgba(74, 222, 128, 0.14); color: #4ade80; }
    .badge-rejected { background: rgba(255, 255, 255, 0.08); color: rgba(255,255,255,0.5); }
    .badge-side { background: rgba(229, 181, 103, 0.12); color: #E5B567; }

    /* settle button */
    .btn-settle {
      width: 100%;
      margin-top: 22px;
      padding: 16px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 16px;
      font-weight: 600;
      background: #E5B567;
      color: #0a0a0c;
      transition: opacity .15s;
    }
    .btn-settle.is-busy, .btn-settle:disabled { opacity: 0.6; pointer-events: none; }

    /* settled state */
    .settled__icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(229, 181, 103, 0.12);
      border: 1px solid rgba(229, 181, 103, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #E5B567;
      font-size: 30px;
    }
    .settled__title {
      margin: 22px 0 0;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 24px;
      font-weight: 600;
      color: #fff;
    }
    .settled__summary {
      margin: 12px 0 0;
      color: rgba(255, 255, 255, 0.55);
      font-size: 15px;
      max-width: 340px;
      line-height: 1.6;
    }
    .btn-reset {
      margin-top: 28px;
      padding: 12px 24px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
    }
    .btn-reset:hover { background: rgba(255, 255, 255, 0.1); }

    .btn-ghost {
      padding: 8px 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.14);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: 'Space Grotesk', sans-serif;
    }
    .btn-ghost:hover { background: rgba(255, 255, 255, 0.1); }
    .btn-link {
      background: none; border: none; cursor: pointer; padding: 0;
      color: rgba(255,255,255,0.55); font-size: 13px; font-family: 'Hanken Grotesk', sans-serif;
    }
    .btn-link:hover { color: #fff; }

    [hidden] { display: none !important; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
</head>
<body>

  <!-- nav -->
  <nav class="nav">
    <div class="nav__left">
      <a href="hero.html" class="nav__home">← Home</a>
      <span class="nav__divider"></span>
      <span class="nav__brand">OTC Desk</span>
    </div>
    <div class="nav__right">
      <div class="role-toggle">
        <button type="button" class="role-btn" data-action="set-role" data-role="taker">Taker</button>
        <button type="button" class="role-btn" data-action="set-role" data-role="maker">Maker</button>
      </div>
      <div class="identity">
        <div class="identity__badge" id="idBadge">··</div>
        <input class="name-input" id="nameInput" placeholder="Your name" autocomplete="off">
      </div>
      <div class="conn"><span class="conn__dot" id="connDot"></span><span id="connText">offline</span></div>
      <div class="nav__chip">
        <span class="nav__chip-dot"></span>
        <span class="nav__chip-text">OFF-CHAIN</span>
      </div>
    </div>
  </nav>

  <div class="page">
    <h1 class="page__title" id="pageTitle">Block trade — XLM / USDC</h1>
    <p class="page__subtitle" id="pageSubtitle"></p>

    <div class="grid">
      <div class="panel" id="leftPanel"></div>
      <div class="panel panel--offers" id="rightPanel"></div>
    </div>
  </div>

  <script>
    (function () {
      // ---- config ----
      // The Oracle service (whitepaper §4): an off-chain price feed both peers
      // consult. getPrice/providePrice are suggestions only (not executable).
      var oracle = {
        mid: 0.1200,       // live USDC per XLM (gently drifts, see step())
        base: 0.1200,      // anchor for the random walk
        // signed spread vs mid where positive = better for the taker
        bps: function (price, side) {
          var raw = (price - this.mid) / this.mid * 10000;
          return side === 'sell' ? raw : -raw;
        },
        // a starting maker quote `bps` away from mid, in the taker's favour direction
        suggest: function (side, bps) {
          return side === 'sell' ? this.mid * (1 - bps / 10000) : this.mid * (1 + bps / 10000);
        },
        // Oracle API — getPrice(makerToken, takerToken): price = takerToken per 1 makerToken
        getPrice: function (makerToken, takerToken) {
          var price = makerToken === takerToken ? 1
                    : (makerToken === 'XLM' ? this.mid : 1 / this.mid);
          return this.providePrice(makerToken, takerToken, price);
        },
        providePrice: function (makerToken, takerToken, price) {
          return { makerToken: makerToken, takerToken: takerToken, price: price };
        },
        // gentle ±~4 bps drift per step, clamped to ±3% of base — feels like a live feed
        step: function () {
          var d = (Math.random() - 0.5) * this.base * 0.0008;
          this.mid = Math.min(this.base * 1.03, Math.max(this.base * 0.97, this.mid + d));
        }
      };

      // localStorage can throw (file://, sandboxed, privacy mode) — degrade gracefully
      var store = {
        get: function (k) { try { return localStorage.getItem(k); } catch (e) { return null; } },
        set: function (k, v) { try { localStorage.setItem(k, v); } catch (e) {} }
      };

      var sb = (window.supabase && window.SUPABASE_URL && window.SUPABASE_ANON_KEY &&
                window.SUPABASE_URL.indexOf('YOUR-PROJECT') === -1)
        ? window.supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY)
        : null;

      // ---- state ----
      var state = {
        role: store.get('rfq_role') || 'taker',
        name: store.get('rfq_display_name') || '',
        address: store.get('rfq_address') || '',
        // taker
        amount: '5000000',
        makerToken: 'XLM',   // token the taker wants to receive (drives side: XLM=buy, USDC=sell)
        takerToken: 'USDC',  // token the taker pays with
        side: 'buy',
        busy: false,
        // shared focused rfq
        rfq: null,            // the focused rfq row (taker's own, or maker's selected)
        quotes: new Map(),    // id -> quote, for the focused rfq
        connected: false,
        // maker
        openRfqs: [],
        // ui drafts (not re-rendered while typing)
        counterFor: null,     // maker_name whose counter box is open (taker view)
        drafts: {},           // maker_name -> draft counter price (taker view)
        makerPriceDraft: '',
        makerTtl: '30'
      };
      var openCh = null, focusCh = null;
      var lastExpireCall = 0;
      var lastOracleStep = 0;
      var settleAnim = false;

      // ---- helpers ----
      function num() { return Math.max(0, parseInt(String(state.amount).replace(/[^0-9]/g, ''), 10) || 0); }
      function parsePrice(v) { return parseFloat(String(v).replace(/[^0-9.]/g, '')) || 0; }
      function fmt(n, d) { d = d || 0; return n.toLocaleString('en-US', { minimumFractionDigits: d, maximumFractionDigits: d }); }
      function timeAgo(iso) {
        var s = Math.max(0, Math.floor((Date.now() - new Date(iso).getTime()) / 1000));
        if (s < 60) return s + 's ago';
        if (s < 3600) return Math.floor(s / 60) + 'm ago';
        if (s < 86400) return Math.floor(s / 3600) + 'h ago';
        return Math.floor(s / 86400) + 'd ago';
      }
      function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]; }); }
      function initialsOf(name) {
        var parts = (name || '').trim().split(/\s+/).filter(Boolean);
        if (!parts.length) return '··';
        if (parts.length === 1) return parts[0].slice(0, 2).toUpperCase();
        return (parts[0][0] + parts[1][0]).toUpperCase();
      }
      function fmtCountdown(rem) {
        if (rem <= 0) return 'expired';
        if (rem < 60) return rem + 's';
        return Math.floor(rem / 60) + ':' + ('0' + (rem % 60)).slice(-2);
      }
      function fmtBps(v) {
        var cls = v >= 0 ? 'bps-pos' : 'bps-neg';
        return '<span class="' + cls + '">' + (v >= 0 ? '+' : '') + v.toFixed(1) + ' bps</span>';
      }
      function ensureClient() {
        if (!sb) return false;
        return true;
      }

      // ---- pure derivations (status is cosmetic; standing = newest row) ----
      function quotesArr() {
        var a = []; state.quotes.forEach(function (q) { a.push(q); }); return a;
      }
      function threadsOf(quotes) {
        var m = new Map();
        quotes.forEach(function (q) {
          var arr = m.get(q.maker_name) || []; arr.push(q); m.set(q.maker_name, arr);
        });
        return m;
      }
      function standingOf(arr) {
        var best = null;
        arr.forEach(function (q) {
          if (!best) { best = q; return; }
          var t1 = new Date(q.created_at).getTime(), t2 = new Date(best.created_at).getTime();
          if (t1 > t2 || (t1 === t2 && q.id > best.id)) best = q;
        });
        return best;
      }
      function isTerminal(s) { return s === 'accepted' || s === 'rejected' || s === 'expired'; }
      function whoseTurn(standing) {
        if (!standing) return 'maker';
        if (isTerminal(standing.status)) return 'closed';
        return standing.from_role === 'maker' ? 'taker' : 'maker';
      }
      function isExpired(standing) {
        return !!standing && standing.status === 'active' &&
               new Date(standing.expires_at).getTime() <= Date.now();
      }
      // [{ maker, standing, thread }] sorted best-first for the rfq's side
      function rankedThreads() {
        var side = state.rfq ? state.rfq.side : 'sell';
        var out = [];
        threadsOf(quotesArr()).forEach(function (arr, maker) {
          out.push({ maker: maker, standing: standingOf(arr), thread: arr });
        });
        function acceptable(t) {
          return t.standing && t.standing.status === 'active' &&
                 t.standing.from_role === 'maker' && !isExpired(t.standing);
        }
        out.sort(function (a, b) {
          var aa = acceptable(a), ba = acceptable(b);
          if (aa !== ba) return aa ? -1 : 1;
          if (aa && ba) {
            return side === 'sell' ? b.standing.price - a.standing.price
                                   : a.standing.price - b.standing.price;
          }
          return new Date(b.standing.created_at) - new Date(a.standing.created_at);
        });
        return out;
      }

      // ---- data layer (every transition guards on status + verifies row count) ----
      // RFQ creation + quote/order submission live in the Peer API (above); these
      // are the read + settlement helpers shared by both roles.
      function listOpenRfqs() {
        return sb.from('rfqs').select('*').eq('status', 'open')
          .order('created_at', { ascending: false }).limit(50);
      }
      function listQuotesForRfq(rfqId) {
        return sb.from('quotes').select('*').eq('rfq_id', rfqId)
          .order('created_at', { ascending: true });
      }
      async function acceptStanding(quote, rfq) {
        // settle the rfq FIRST, guarded on still-open
        var r1 = await sb.from('rfqs').update({
          status: 'settled', accepted_quote_id: quote.id, maker: quote.maker_name, price: quote.price
        }).eq('id', rfq.id).eq('status', 'open').select();
        if (r1.error) throw r1.error;
        if (!r1.data || r1.data.length !== 1) return { raceLost: true };
        // mark the accepted quote, then reject siblings (best-effort, cosmetic)
        await sb.from('quotes').update({ status: 'accepted' }).eq('id', quote.id).eq('status', 'active');
        await sb.from('quotes').update({ status: 'rejected' })
          .eq('rfq_id', rfq.id).neq('id', quote.id).eq('status', 'active');
        return { ok: true, rfq: r1.data[0] };
      }
      function expireStale(rfqId) {
        return sb.from('quotes').update({ status: 'expired' })
          .eq('rfq_id', rfqId).eq('status', 'active').lt('expires_at', new Date().toISOString());
      }

      // ---- tokens & order envelope helpers ----
      var TOKENS = ['XLM', 'USDC'];
      function otherToken(t) { return t === 'XLM' ? 'USDC' : 'XLM'; }
      // makerToken = the token the taker wants to RECEIVE; this fixes the trade direction
      function sideForMakerToken(mt) { return mt === 'XLM' ? 'buy' : 'sell'; }
      function makerTokenOf(r) { return (r && r.maker_token) || 'XLM'; }
      function takerTokenOf(r) { return (r && r.taker_token) || 'USDC'; }
      function makerAmountOf(r) { return Number(r && r.maker_amount != null ? r.maker_amount : (r ? r.amount : 0)) || 0; }
      // amount the taker pays (in takerToken units) for `makerAmount` of makerToken at `price` USDC/XLM
      function payAmount(makerAmount, price, makerToken) {
        if (!price) return 0;
        return makerToken === 'XLM' ? makerAmount * price : makerAmount / price;
      }
      // inverse of payAmount: a total (in takerToken) → per-unit price (USDC/XLM)
      function priceFromTotal(total, makerAmount, makerToken) {
        if (!total || !makerAmount) return 0;
        return makerToken === 'XLM' ? total / makerAmount   // buy:  USDC total / XLM amount
                                    : makerAmount / total;  // sell: USDC amount / XLM total
      }
      function tokDp(tok) { return tok === 'USDC' ? 2 : 0; }
      // total headline (e.g. "615,000 USDC") and small per-unit reference ("$0.12300/XLM")
      function totalLabel(r, price) {
        return fmt(payAmount(makerAmountOf(r), price, makerTokenOf(r)), tokDp(takerTokenOf(r))) + ' ' + takerTokenOf(r);
      }
      function unitLabel(price) { return '$' + Number(price).toFixed(5) + '/XLM'; }
      // Oracle fairness check (Taker side): is a quote/order within tolerance of the feed?
      var ORACLE_TOL_BPS = 15;
      function oracleVerdict(price, side) {           // bps signed: + = better for taker
        var b = oracle.bps(price, side);
        if (b >= -ORACLE_TOL_BPS)
          return { ok: true,  text: 'Oracle ✓ ' + (b >= 0 ? 'at/above fair' : 'fair') };
        return     { ok: false, text: 'Oracle ⚠ ' + Math.abs(b).toFixed(1) + ' bps over fair' };
      }
      // mock signing primitives (no wallet / no on-chain yet — values are placeholders)
      function mockNonce() { return String(Math.floor(Math.random() * 1e15)); }
      function mockSignature() {
        var h = '0123456789abcdef', s = '0x';
        for (var i = 0; i < 64; i++) s += h[Math.floor(Math.random() * 16)];
        return s;
      }
      function genAddress() {
        var b32 = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ234567', s = 'G';
        for (var i = 0; i < 55; i++) s += b32[Math.floor(Math.random() * 32)];
        return s;
      }

      // ---- Peer Protocol API (off-chain, transport-agnostic RPCs over Supabase) ----
      // Order API: executable, "signed" orders.  Quote API: indicative, not executable.
      var Peer = {
        // Taker → Maker: "I want to buy <makerAmount> <makerToken> using <takerToken>."
        getOrder: function (makerAmount, makerToken, takerToken, takerAddress) {
          return sb.from('rfqs').insert({
            side: sideForMakerToken(makerToken),
            amount: makerAmount, maker_amount: makerAmount,
            maker_token: makerToken, taker_token: takerToken,
            base_asset: makerToken, quote_asset: takerToken,
            status: 'open', request_kind: 'order',
            taker_name: state.name || null, taker_address: takerAddress || null
          }).select().single();
        },
        // Taker → Maker: "How much would it cost to buy <makerAmount> <makerToken>?"
        getQuote: function (makerAmount, makerToken, takerTokens) {
          var takerToken = (takerTokens && takerTokens[0]) || otherToken(makerToken);
          return sb.from('rfqs').insert({
            side: sideForMakerToken(makerToken),
            amount: makerAmount, maker_amount: makerAmount,
            maker_token: makerToken, taker_token: takerToken,
            base_asset: makerToken, quote_asset: takerToken,
            status: 'open', request_kind: 'quote',
            taker_name: state.name || null
          }).select().single();
        },
        // Maker → Taker: a signed, executable order (carries expiration, nonce, signature).
        // Also used for taker counter-offers (from_role='taker'), which carry no signature.
        provideOrder: async function (o) {
          var signed = (o.fromRole || 'maker') === 'maker';
          await sb.from('quotes').update({ status: 'superseded' })
            .eq('rfq_id', o.rfqId).eq('maker_name', o.makerName).eq('status', 'active');
          return sb.from('quotes').insert({
            rfq_id: o.rfqId, maker_name: o.makerName, maker_initials: o.makerInitials || null,
            price: o.price, from_role: o.fromRole || 'maker', status: 'active',
            response_kind: 'order',
            expires_at: new Date(Date.now() + o.ttlSec * 1000).toISOString(),
            maker_address: signed ? (o.makerAddress || null) : null,
            taker_amount: o.takerAmount,
            nonce: signed ? mockNonce() : null,
            signature: signed ? mockSignature() : null,
            parent_id: o.parentId || null
          }).select().single();
        },
        // Maker → Taker: an indicative quote (not executable, no signature).
        provideQuote: async function (o) {
          await sb.from('quotes').update({ status: 'superseded' })
            .eq('rfq_id', o.rfqId).eq('maker_name', o.makerName).eq('status', 'active');
          return sb.from('quotes').insert({
            rfq_id: o.rfqId, maker_name: o.makerName, maker_initials: o.makerInitials || null,
            price: o.price, from_role: 'maker', status: 'active',
            response_kind: 'quote',
            expires_at: new Date(Date.now() + o.ttlSec * 1000).toISOString(),
            taker_amount: o.takerAmount, parent_id: null
          }).select().single();
        },
        // Taker turns an indicative request into a firm (signed) order request.
        escalateToOrder: function (rfqId) {
          return sb.from('rfqs').update({ request_kind: 'order' }).eq('id', rfqId).select().single();
        }
      };

      // ---- realtime ----
      function removeFocus() { if (focusCh) { try { sb.removeChannel(focusCh); } catch (e) {} focusCh = null; } }
      function removeOpen() { if (openCh) { try { sb.removeChannel(openCh); } catch (e) {} openCh = null; } }
      function teardownAll() { removeFocus(); removeOpen(); state.connected = false; }

      function subscribeFocus(rfqId) {
        removeFocus();
        focusCh = sb.channel('rfq-' + rfqId)
          .on('postgres_changes', { event: '*', schema: 'public', table: 'quotes', filter: 'rfq_id=eq.' + rfqId },
            function (p) { if (p['new'] && p['new'].id) { state.quotes.set(p['new'].id, p['new']); render(); } })
          .on('postgres_changes', { event: 'UPDATE', schema: 'public', table: 'rfqs', filter: 'id=eq.' + rfqId },
            function (p) {
              if (!p['new']) return;
              if (state.rfq && state.rfq.id === p['new'].id) state.rfq = p['new'];
              upsertOpenRfq(p['new']);
              render();
            })
          .subscribe(function (st) { state.connected = (st === 'SUBSCRIBED'); render(); });
      }
      function subscribeOpenFeed() {
        removeOpen();
        openCh = sb.channel('open-feed')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'rfqs' },
            function (p) { if (p['new']) upsertOpenRfq(p['new']); render(); })
          .subscribe(function (st) { state.connected = (st === 'SUBSCRIBED'); render(); });
      }
      function upsertOpenRfq(row) {
        var i = -1;
        for (var k = 0; k < state.openRfqs.length; k++) { if (state.openRfqs[k].id === row.id) { i = k; break; } }
        if (row.status === 'open') {
          if (i >= 0) state.openRfqs[i] = row; else state.openRfqs.unshift(row);
        } else if (i >= 0) {
          state.openRfqs.splice(i, 1);
        }
      }

      // ---- actions ----
      function setRole(role) {
        if (role === state.role) return;
        state.role = role;
        store.set('rfq_role', role);
        teardownAll();
        state.openRfqs = [];
        state.counterFor = null; state.drafts = {};
        // Keep the focused RFQ + its quotes so a single operator can flip
        // Taker ↔ Maker in one tab and watch both sides of the negotiation.
        if (state.rfq) subscribeFocus(state.rfq.id);
        if (role === 'maker') mountMaker(); else render();
      }
      function setName(v) {
        state.name = v;
        store.set('rfq_display_name', v);
        var b = document.getElementById('idBadge'); if (b) b.textContent = initialsOf(v);
      }
      function setMakerToken(t) {
        if (TOKENS.indexOf(t) < 0) return;
        state.makerToken = t; state.takerToken = otherToken(t);
        state.side = sideForMakerToken(t); render();
      }
      function setTakerToken(t) {
        if (TOKENS.indexOf(t) < 0) return;
        state.takerToken = t; state.makerToken = otherToken(t);
        state.side = sideForMakerToken(state.makerToken); render();
      }

      // kind: 'quote' (indicative) | 'order' (firm/signed)
      async function requestRfq(kind) {
        if (num() <= 0 || state.busy) return;
        if (!ensureClient()) { render(); return; }
        state.busy = true; removeFocus(); state.rfq = null; state.quotes = new Map(); render();
        try {
          var makerAmount = num();
          var res = kind === 'quote'
            ? await Peer.getQuote(makerAmount, state.makerToken, [state.takerToken])
            : await Peer.getOrder(makerAmount, state.makerToken, state.takerToken, state.address);
          if (res.error) throw res.error;
          state.rfq = res.data;
          state.busy = false;
          subscribeFocus(res.data.id);
          render();
        } catch (e) {
          state.busy = false; render();
          alert('Could not open RFQ: ' + (e.message || e));
        }
      }

      async function escalateOrder() {
        if (!state.rfq || state.rfq.request_kind === 'order') return;
        try {
          var r = await Peer.escalateToOrder(state.rfq.id);
          if (r.error) throw r.error;
          if (r.data) state.rfq = r.data;
          render();
        } catch (e) { alert('Could not request a firm order: ' + (e.message || e)); }
      }

      async function takerCounter(makerName) {
        // draft now holds the TOTAL the taker offers (in takerToken)
        var total = parsePrice(state.drafts[makerName]);
        if (total <= 0 || !state.rfq) return;
        var price = priceFromTotal(total, num(), makerTokenOf(state.rfq));
        if (price <= 0) return;
        // find the maker's current standing to carry initials forward
        var arr = threadsOf(quotesArr()).get(makerName) || [];
        var st = standingOf(arr);
        try {
          var res = await Peer.provideOrder({
            rfqId: state.rfq.id, makerName: makerName,
            makerInitials: st ? st.maker_initials : initialsOf(makerName),
            price: price, fromRole: 'taker', ttlSec: 60, parentId: st ? st.id : null,
            takerAmount: total
          });
          if (res.error) throw res.error;
          state.quotes.set(res.data.id, res.data);
          state.counterFor = null; state.drafts[makerName] = '';
          render();
        } catch (e) { alert('Counter failed: ' + (e.message || e)); }
      }

      async function accept(quoteId) {
        var q = state.quotes.get(quoteId);
        if (!q || !state.rfq) return;
        if (isExpired(q)) { alert('That quote has expired.'); return; }
        settleAnim = true; render();
        try {
          var r = await acceptStanding(q, state.rfq);
          settleAnim = false;
          if (r.raceLost) {
            alert('That quote is no longer available — refreshing.');
            await rehydrateFocus();
            return;
          }
          if (r.rfq) state.rfq = r.rfq;
          render();
        } catch (e) { settleAnim = false; render(); alert('Accept failed: ' + (e.message || e)); }
      }

      function reset() {
        removeFocus();
        state.rfq = null; state.quotes = new Map(); state.counterFor = null; state.drafts = {};
        render();
      }

      // maker
      async function mountMaker() {
        render();
        if (!ensureClient()) return;
        try {
          var res = await listOpenRfqs();
          if (res.error) throw res.error;
          state.openRfqs = res.data || [];
        } catch (e) { state.openRfqs = []; }
        subscribeOpenFeed();
        render();
      }
      async function selectRfq(rfqId) {
        var row = null;
        for (var i = 0; i < state.openRfqs.length; i++) if (state.openRfqs[i].id === rfqId) row = state.openRfqs[i];
        if (!row) return;
        state.rfq = row; state.quotes = new Map();
        render();
        await rehydrateFocus();
        subscribeFocus(rfqId);
      }
      function makerBack() { removeFocus(); state.rfq = null; state.quotes = new Map(); render(); }

      async function makerSubmit() {
        if (!state.rfq) return;
        if (!state.name) { alert('Enter a maker name in the top bar first.'); return; }
        var r = state.rfq;
        var makerAmount = makerAmountOf(r), makerToken = makerTokenOf(r);
        // draft now holds the TOTAL the maker offers (in takerToken)
        var takerAmount = parsePrice(state.makerPriceDraft);
        if (takerAmount <= 0) { alert('Enter a total.'); return; }
        var price = priceFromTotal(takerAmount, makerAmount, makerToken);
        if (price <= 0) { alert('Enter a total.'); return; }
        var ttl = parseInt(state.makerTtl, 10) || 30;
        try {
          var res;
          if (r.request_kind === 'quote') {
            // indicative response — provideQuote (not executable)
            res = await Peer.provideQuote({
              rfqId: r.id, makerName: state.name, makerInitials: initialsOf(state.name),
              price: price, takerAmount: takerAmount, ttlSec: ttl
            });
          } else {
            // firm response — provideOrder (signed, executable)
            res = await Peer.provideOrder({
              rfqId: r.id, makerName: state.name, makerInitials: initialsOf(state.name),
              makerAddress: state.address, makerAmount: makerAmount, makerToken: makerToken,
              takerAddress: r.taker_address, takerAmount: takerAmount, takerToken: takerTokenOf(r),
              price: price, ttlSec: ttl, fromRole: 'maker'
            });
          }
          if (res.error) throw res.error;
          state.quotes.set(res.data.id, res.data);
          state.makerPriceDraft = '';
          render();
        } catch (e) { alert('Quote failed: ' + (e.message || e)); }
      }
      async function makerAcceptCounter(quoteId) {
        var q = state.quotes.get(quoteId);
        if (!q || !state.rfq) return;
        if (isExpired(q)) { alert('That counter has expired.'); return; }
        try {
          var r = await acceptStanding(q, state.rfq);
          if (r.raceLost) { alert('No longer available — refreshing.'); await rehydrateFocus(); return; }
          if (r.rfq) state.rfq = r.rfq;
          render();
        } catch (e) { alert('Accept failed: ' + (e.message || e)); }
      }

      async function rehydrateFocus() {
        if (!state.rfq || !sb) { render(); return; }
        try {
          var rq = await sb.from('rfqs').select('*').eq('id', state.rfq.id).single();
          if (!rq.error && rq.data) state.rfq = rq.data;
          var res = await listQuotesForRfq(state.rfq.id);
          if (!res.error) {
            state.quotes = new Map();
            (res.data || []).forEach(function (q) { state.quotes.set(q.id, q); });
          }
        } catch (e) {}
        render();
      }

      async function refresh() {
        if (state.role === 'maker' && !state.rfq) {
          var res = await listOpenRfqs();
          if (!res.error) state.openRfqs = res.data || [];
        } else {
          await rehydrateFocus();
        }
        render();
      }

      // ---- countdown tick (no full re-render) ----
      function tick() {
        var now = Date.now();
        // gently move the Oracle feed and refresh bps/badges (render preserves focus)
        if (now - lastOracleStep > 4000) { lastOracleStep = now; oracle.step(); render(); }
        document.querySelectorAll('[data-expires]').forEach(function (el) {
          var exp = Number(el.getAttribute('data-expires'));
          el.textContent = fmtCountdown(Math.max(0, Math.floor((exp - now) / 1000)));
        });
        document.querySelectorAll('[data-accept-exp]').forEach(function (btn) {
          if (Number(btn.getAttribute('data-accept-exp')) <= now) {
            btn.disabled = true; btn.classList.add('is-disabled');
            var card = btn.closest('.offer'); if (card) card.classList.add('is-expired');
          }
        });
        // opportunistic, debounced cosmetic expiry
        if (sb && state.rfq && now - lastExpireCall > 4000) {
          var hasStale = false;
          state.quotes.forEach(function (q) {
            if (q.status === 'active' && new Date(q.expires_at).getTime() <= now) hasStale = true;
          });
          if (hasStale) { lastExpireCall = now; expireStale(state.rfq.id); }
        }
      }

      // ---- render ----
      function render() {
        // preserve focus across innerHTML rebuilds
        var active = document.activeElement;
        var activeId = active && active.id ? active.id : null;
        var caret = active && typeof active.selectionStart === 'number' ? active.selectionStart : null;

        syncNav();
        document.getElementById('leftPanel').innerHTML = state.role === 'taker' ? leftTaker() : leftMaker();
        document.getElementById('rightPanel').innerHTML = state.role === 'taker' ? rightTaker() : rightMaker();

        if (activeId) {
          var el = document.getElementById(activeId);
          if (el) { el.focus(); if (caret != null && el.setSelectionRange) { try { el.setSelectionRange(caret, caret); } catch (e) {} } }
        }
      }

      function syncNav() {
        document.querySelectorAll('.role-btn').forEach(function (b) {
          b.classList.toggle('is-active', b.getAttribute('data-role') === state.role);
        });
        var name = document.getElementById('nameInput');
        if (name && document.activeElement !== name) name.value = state.name;
        document.getElementById('idBadge').textContent = initialsOf(state.name);
        document.getElementById('connDot').classList.toggle('is-on', state.connected);
        document.getElementById('connText').textContent = state.connected ? 'live' : (sb ? 'connecting…' : 'no backend');
        document.getElementById('pageTitle').textContent = state.role === 'taker'
          ? 'Request quotes — XLM / USDC' : 'Provide liquidity — XLM / USDC';
        document.getElementById('pageSubtitle').textContent = state.role === 'taker'
          ? 'Open an RFQ, let makers compete with time-limited quotes, counter for a better price, and accept the best one. Off-chain negotiation only.'
          : 'Browse open requests broadcast by takers, quote a price, and negotiate counters in real time. Off-chain negotiation only.';
      }

      function noBackendBlock() {
        return '<div class="state"><div class="state__icon">⚠</div>' +
          '<p class="state__text">Supabase is not configured. Add your project URL and anon key to <b>supabase-config.js</b>, then reload.</p></div>';
      }

      // ---------- TAKER ----------
      function tokenSelect(id, label, value) {
        return '<div class="field"><label class="field__label" for="' + id + '">' + label + '</label>' +
          '<select id="' + id + '" class="token-select">' +
            TOKENS.map(function (t) { return '<option value="' + t + '"' + (t === value ? ' selected' : '') + '>' + t + '</option>'; }).join('') +
          '</select></div>';
      }

      function leftTaker() {
        var busy = state.busy;
        var live = state.rfq && state.rfq.status === 'open';
        var mt = state.makerToken, tt = state.takerToken;
        var refPay = payAmount(num(), oracle.mid, mt);
        var ticket = '' +
          '<div class="panel__label">RFQ TICKET</div>' +
          tokenSelect('makerTokenSel', 'Token I want to receive', mt) +
          '<div class="field">' +
            '<label class="field__label" for="amountInput">Amount (' + esc(mt) + ')</label>' +
            '<input id="amountInput" class="field__input" inputmode="numeric" value="' + esc(state.amount) + '">' +
            '<div class="field__hint">Oracle mid $' + oracle.mid.toFixed(5) + ' · pay ≈ ' + fmt(refPay, tokDp(tt)) + ' ' + esc(tt) + ' at mid</div>' +
          '</div>' +
          tokenSelect('takerTokenSel', 'Token I will pay with', tt);

        if (live) {
          return ticket +
            '<button type="button" class="btn-quote" style="margin-top:24px;" data-action="new-rfq">Start a new RFQ</button>' +
            '<p class="field__hint">RFQ #' + esc(String(state.rfq.id).slice(0, 8)) + ' live · ' +
              (state.rfq.request_kind === 'quote' ? 'indicative quote' : 'firm order') +
              ' · waiting for makers.</p>';
        }
        return ticket +
          '<div class="ticket-actions">' +
            '<button type="button" class="btn-quote ' + (busy ? 'is-busy' : '') + '" data-action="get-quote">' +
              (busy ? 'Opening…' : 'Get indicative quote') + '</button>' +
            '<button type="button" class="btn-request ' + (busy ? 'is-busy' : '') + '" data-action="request-order">' +
              (busy ? 'Opening…' : 'Request firm order') + '</button>' +
          '</div>' +
          '<p class="field__hint">A <b>quote</b> is indicative pricing; a <b>firm order</b> is a signed, executable order you can accept.</p>';
      }

      function rightTaker() {
        if (!sb) return offersHead('') + noBackendBlock();
        if (!state.rfq) {
          return offersHead('') +
            '<div class="state"><div class="state__icon">⇄</div>' +
            '<p class="state__text">Set your size and request quotes. Makers respond with time-limited offers you can accept or counter.</p></div>';
        }
        if (state.rfq.status === 'settled') return rightTaker_settled();

        var ranked = rankedThreads();
        var live = ranked.filter(function (t) { return t.standing && t.standing.status === 'active' && t.standing.from_role === 'maker' && !isExpired(t.standing); }).length;
        var head = offersHead(live + ' live · ' + ranked.length + ' makers');
        if (settleAnim) {
          return head + '<div class="state"><div class="state__loading-title">Settling…</div><p class="state__loading-sub">Locking in the accepted quote</p></div>';
        }
        if (!ranked.length) {
          return head + '<div class="state"><div class="state__loading-title">Collecting quotes…</div><p class="state__loading-sub">RFQ broadcast to the maker network</p></div>';
        }
        var cards = ranked.map(function (t, i) { return takerCard(t, i === 0 && t.standing.from_role === 'maker' && t.standing.response_kind === 'order' && t.standing.status === 'active' && !isExpired(t.standing)); }).join('');
        return head + '<div class="offers__list">' + cards + '</div>';
      }

      function offersHead(status) {
        return '<div class="offers__head">' +
          '<div class="panel__label">MAKER OFFERS</div>' +
          '<div style="display:flex;align-items:center;gap:12px;">' +
            '<span class="oracle-chip">Oracle mid <b>$' + oracle.mid.toFixed(5) + '</b></span>' +
            '<span class="offers__status">' + esc(status) + '</span>' +
            (sb ? '<button type="button" class="btn-ghost" data-action="refresh">↻</button>' : '') +
          '</div></div>';
      }

      function takerCard(t, isBest) {
        var s = t.standing, n = num();
        var r = state.rfq;
        var makerToken = makerTokenOf(r), takerToken = takerTokenOf(r);
        var expired = isExpired(s);
        var pay = payAmount(n, s.price, makerToken);
        var side = r.side;
        var indicative = s.response_kind === 'quote';
        var turn = whoseTurn(s);
        var kindTag = indicative
          ? '<span class="kind-tag kind-tag--quote">INDICATIVE</span>'
          : '<span class="kind-tag kind-tag--order">SIGNED ORDER</span>';
        var meta;
        if (s.status === 'active' && !isTerminal(s.status)) {
          meta = kindTag + ' · ' + fmtBps(oracle.bps(s.price, side)) +
            ' · ' + (s.from_role === 'taker' ? 'your counter' : (indicative ? 'maker quote' : 'maker order')) +
            ' · <span data-expires="' + new Date(s.expires_at).getTime() + '">' + fmtCountdown(Math.max(0, Math.floor((new Date(s.expires_at).getTime() - Date.now()) / 1000))) + '</span>';
        } else {
          meta = kindTag + ' · ' + fmtBps(oracle.bps(s.price, side)) + ' · ' + esc(s.status);
        }

        var actions = '';
        if (indicative) {
          // not executable; offer to lock terms with a firm signed order
          if (r.request_kind === 'quote' && !expired) {
            actions = '<div class="offer__actions"><button type="button" class="btn-accept" data-action="escalate">Request firm order</button></div>' +
              '<p class="waiting">Indicative only — request a firm signed order to lock these terms.</p>';
          } else {
            actions = '<p class="waiting">Indicative quote — waiting for a signed order from ' + esc(t.maker) + '.</p>';
          }
        } else if (turn === 'taker' && !expired) {
          actions =
            '<div class="offer__actions">' +
              '<button type="button" class="btn-accept" data-action="accept" data-id="' + esc(s.id) + '" data-accept-exp="' + new Date(s.expires_at).getTime() + '">Accept</button>' +
              '<button type="button" class="btn-counter" data-action="open-counter" data-maker="' + esc(t.maker) + '">Counter</button>' +
            '</div>';
        } else if (turn === 'maker') {
          actions = '<p class="waiting">Countered ' + totalLabel(r, s.price) + ' — waiting for ' + esc(t.maker) + ' to re-quote.</p>';
        } else if (expired) {
          actions = '<div class="offer__actions"><button type="button" class="btn-counter" data-action="open-counter" data-maker="' + esc(t.maker) + '">Re-engage / counter</button></div>';
        }
        if (state.counterFor === t.maker) {
          actions +=
            '<div class="counter-box">' +
              '<input id="counter-' + esc(t.maker) + '" inputmode="decimal" placeholder="Total you offer (' + esc(takerToken) + ')" value="' + esc(state.drafts[t.maker] || '') + '">' +
              '<button type="button" class="btn-accept" style="flex:0 0 auto;padding:11px 18px;" data-action="send-counter" data-maker="' + esc(t.maker) + '">Send</button>' +
            '</div>';
        }

        var badge = (!indicative && s.from_role === 'maker' && s.nonce)
          ? '<div class="order-badge">🔏 Signed order · nonce ' + esc(String(s.nonce).slice(0, 8)) +
            ' · sig ' + esc(String(s.signature || '').slice(0, 10)) + '…</div>'
          : '';

        // Oracle verification (Taker calls getPrice to check the order is fair)
        var v = oracleVerdict(s.price, side);
        var oracleChip = '<div class="oracle-check ' + (v.ok ? 'is-ok' : 'is-warn') + '">' +
          esc(v.text) + ' · feed ' + unitLabel(oracle.mid) + '</div>';

        return '<div class="offer ' + (isBest ? 'is-best' : '') + ' ' + (expired ? 'is-expired' : '') + '">' +
          '<div class="offer__row">' +
            '<div class="offer__maker">' +
              '<div class="offer__avatar">' + esc(s.maker_initials || initialsOf(t.maker)) + '</div>' +
              '<div><div class="offer__name">' + esc(t.maker) + '</div>' +
              '<div class="offer__meta">' + meta + '</div></div>' +
            '</div>' +
            '<div class="offer__priceblock">' +
              '<div class="offer__price">' + fmt(pay, tokDp(takerToken)) + ' ' + esc(takerToken) + '</div>' +
              '<div class="offer__total">≈ ' + unitLabel(s.price) + '</div>' +
            '</div>' +
          '</div>' +
          oracleChip +
          (isBest ? '<div class="offer__best">★ BEST QUOTE</div>' : '') +
          badge +
          actions +
        '</div>';
      }

      function rightTaker_settled() {
        var r = state.rfq;
        var mt = makerTokenOf(r), tt = takerTokenOf(r);
        var makerAmount = makerAmountOf(r);
        var pay = payAmount(makerAmount, Number(r.price), mt);
        var summary = 'Received ' + fmt(makerAmount, tokDp(mt)) + ' ' + esc(mt) + ' for ' +
          fmt(pay, tokDp(tt)) + ' ' + esc(tt) + ' at $' + Number(r.price).toFixed(5) +
          ' via ' + esc(r.maker) + ' — signed order accepted off-chain.';
        return offersHead('settled') +
          '<div class="state">' +
            '<div class="settled__icon">✓</div>' +
            '<h3 class="settled__title">Quote accepted</h3>' +
            '<p class="settled__summary">' + summary + '</p>' +
            '<button type="button" class="btn-reset" data-action="reset">New RFQ</button>' +
          '</div>';
      }

      // ---------- MAKER ----------
      function leftMaker() {
        var inThread = !!state.rfq;
        return '' +
          '<div class="panel__label">MAKER DESK</div>' +
          '<div class="field"><div class="field__label">Quoting as</div>' +
            '<div style="margin-top:10px;font-family:\'Space Grotesk\',sans-serif;font-size:20px;font-weight:600;">' +
            (state.name ? esc(state.name) : '<span style="color:rgba(255,255,255,0.4)">set your name above →</span>') + '</div></div>' +
          '<div class="field"><div class="field__label">Oracle reference</div>' +
            '<div style="margin-top:10px;font-family:\'Space Grotesk\',sans-serif;font-size:20px;font-weight:600;color:#E5B567;">$' + oracle.mid.toFixed(5) + '</div></div>' +
          (inThread
            ? '<button type="button" class="btn-ghost" style="margin-top:24px;" data-action="maker-back">← All open requests</button>'
            : '<p class="field__hint">Pick an open request on the right to quote. Open a second tab as a Taker to see both sides.</p>');
      }

      function rightMaker() {
        if (!sb) return '<div class="offers__head"><div class="panel__label">OPEN REQUESTS</div></div>' + noBackendBlock();
        if (state.rfq) return makerThread();
        var head = '<div class="offers__head"><div class="panel__label">OPEN REQUESTS</div>' +
          '<div style="display:flex;align-items:center;gap:12px;">' +
          '<span class="offers__status">' + state.openRfqs.length + ' open</span>' +
          '<button type="button" class="btn-ghost" data-action="refresh">↻ Refresh</button></div></div>';
        if (!state.openRfqs.length) {
          return head + '<div class="state"><div class="state__icon">⇄</div><p class="state__text">No open requests yet. Open a tab as a Taker and post one.</p></div>';
        }
        var cards = state.openRfqs.map(function (r) {
          var mt = makerTokenOf(r), tt = takerTokenOf(r);
          var amt = makerAmountOf(r);
          var isQuote = r.request_kind === 'quote';
          var kindTag = '<span class="kind-tag ' + (isQuote ? 'kind-tag--quote">QUOTE' : 'kind-tag--order">ORDER') + '</span>';
          return '<div class="offer is-clickable" data-action="select-rfq" data-id="' + esc(r.id) + '">' +
            '<div class="offer__row">' +
              '<div class="offer__maker">' +
                '<div class="offer__avatar">' + initialsOf(r.taker_name || mt) + '</div>' +
                '<div><div class="offer__name">' + fmt(amt, tokDp(mt)) + ' ' + esc(mt) + '</div>' +
                '<div class="offer__meta">wants ' + esc(mt) + ' · pays ' + esc(tt) + ' · ' + esc(r.taker_name || 'Anon taker') + ' · ' + timeAgo(r.created_at) + '</div></div>' +
              '</div>' +
              '<div class="offer__priceblock">' + kindTag + '</div>' +
            '</div></div>';
        }).join('');
        return head + '<div class="offers__list">' + cards + '</div>';
      }

      function makerThread() {
        var r = state.rfq;
        var mt = makerTokenOf(r), tt = takerTokenOf(r);
        var n = makerAmountOf(r);
        var isQuote = r.request_kind === 'quote';
        var mine = state.name ? (threadsOf(quotesArr()).get(state.name) || []) : [];
        var standing = standingOf(mine);
        var turn = whoseTurn(standing);
        var expired = isExpired(standing);

        var head = '<div class="offers__head"><div class="panel__label">NEGOTIATION</div>' +
          '<div style="display:flex;align-items:center;gap:12px;">' +
          '<span class="oracle-chip">Oracle mid <b>$' + oracle.mid.toFixed(5) + '</b></span>' +
          '<button type="button" class="btn-ghost" data-action="refresh">↻</button></div></div>';

        var kindTag = '<span class="kind-tag ' + (isQuote ? 'kind-tag--quote">QUOTE REQUEST' : 'kind-tag--order">ORDER REQUEST') + '</span>';
        var summary = '<div class="rfq-summary">' +
          '<div class="rfq-summary__amt">' + fmt(n, tokDp(mt)) + ' ' + esc(mt) + ' ' + kindTag + '</div>' +
          '<div class="rfq-summary__meta">wants ' + esc(mt) + ' · pays ' + esc(tt) + ' · ' + esc(r.taker_name || 'Anon taker') + ' · #' + esc(String(r.id).slice(0, 8)) +
          (r.status === 'settled' ? ' · <span class="badge-status badge-accepted">SETTLED</span>' : '') + '</div></div>';

        var rows = mine.slice().sort(function (a, b) { return new Date(a.created_at) - new Date(b.created_at); }).map(function (q) {
          var isStanding = standing && q.id === standing.id;
          var who = q.from_role === 'maker' ? 'You' : 'Taker';
          var cd = (isStanding && q.status === 'active')
            ? ' · <span data-expires="' + new Date(q.expires_at).getTime() + '">' + fmtCountdown(Math.max(0, Math.floor((new Date(q.expires_at).getTime() - Date.now()) / 1000))) + '</span>'
            : (isTerminal(q.status) ? ' · ' + esc(q.status) : '');
          var pay = payAmount(n, q.price, mt);
          return '<div class="thread-row ' + (isStanding ? 'is-standing' : '') + '">' +
            '<div><div class="thread-from">' + who + cd + '</div>' +
            '<div class="offer__meta">' + fmtBps(oracle.bps(q.price, r.side)) + ' · ' + unitLabel(q.price) +
            (q.from_role === 'maker' && q.response_kind === 'order' && q.nonce ? ' · <span class="kind-tag kind-tag--order">SIGNED</span>' : '') + '</div></div>' +
            '<div class="thread-price">' + fmt(pay, tokDp(tt)) + ' ' + esc(tt) + '</div></div>';
        }).join('');

        // taker upgraded an indicative request to a firm order → prompt a signed order
        var needsSign = standing && standing.from_role === 'maker' && standing.response_kind === 'quote' &&
                        !isQuote && standing.status === 'active' && !expired;

        var action = '';
        if (r.status === 'settled') {
          // a maker "won" if the accepted quote belongs to their thread
          var acceptedMine = mine.some(function (q) { return q.id === r.accepted_quote_id; });
          action = '<p class="waiting"><span class="badge-status ' + (acceptedMine ? 'badge-accepted">Your quote was accepted ✓' : 'badge-rejected">Settled with another maker') + '</span></p>';
        } else if (!standing || turn === 'maker' || expired || needsSign) {
          // empty thread, OR taker countered, OR expired, OR escalation to a signed order → maker acts
          var counterPending = standing && standing.from_role === 'taker' && standing.status === 'active' && !expired;
          action =
            (needsSign
              ? '<p class="waiting">Taker upgraded this to a <b>firm order</b> — send a signed order to lock the trade.</p>'
              : '') +
            (counterPending
              ? '<p class="waiting">Taker countered at <b>' + totalLabel(r, standing.price) + '</b> (' + unitLabel(standing.price) + '). Accept it or re-quote.</p>' +
                '<button type="button" class="btn-settle" data-action="maker-accept" data-id="' + esc(standing.id) + '" data-accept-exp="' + new Date(standing.expires_at).getTime() + '">Accept taker\'s ' + totalLabel(r, standing.price) + '</button>'
              : '') +
            (function () {
              // Maker calls getPrice on the Oracle to price the order fairly
              var op = oracle.getPrice(mt, tt);
              var fairTotal = payAmount(n, oracle.mid, mt);
              return '<div class="oracle-suggest">' +
                '<div class="oracle-suggest__main">Oracle · getPrice(' + esc(mt) + ', ' + esc(tt) + ') → 1 ' + esc(mt) + ' = ' + op.price.toFixed(5) + ' ' + esc(tt) + '</div>' +
                '<div class="oracle-suggest__row"><span>fair total ≈ ' + fmt(fairTotal, tokDp(tt)) + ' ' + esc(tt) + '</span>' +
                '<button type="button" class="btn-oracle" data-action="use-oracle">Use</button></div>' +
                '</div>';
            })() +
            '<div class="field"><label class="field__label" for="makerPrice">' + (standing ? 'Re-quote total' : 'Total you offer') + ' (' + esc(tt) + ')</label>' +
              '<input id="makerPrice" class="field__input" inputmode="decimal" placeholder="' + fmt(payAmount(n, oracle.mid, mt), tokDp(tt)) + '" value="' + esc(state.makerPriceDraft) + '">' +
              (state.makerPriceDraft
                ? (function () { var dp = priceFromTotal(parsePrice(state.makerPriceDraft), n, mt);
                    return '<div class="field__hint">' + unitLabel(dp) + ' · ' + fmtBps(oracle.bps(dp, r.side)) + ' vs oracle</div>'; })()
                : '') +
            '</div>' +
            '<select id="makerTtl" class="ttl-select">' +
              ['15', '30', '60', '120'].map(function (s) { return '<option value="' + s + '"' + (state.makerTtl === s ? ' selected' : '') + '>Valid for ' + s + 's</option>'; }).join('') +
            '</select>' +
            '<button type="button" class="btn-request" data-action="maker-submit">' +
              (isQuote ? (standing ? 'Send re-quote (indicative)' : 'Send indicative quote')
                       : (standing ? 'Send signed re-quote' : 'Send signed order')) + '</button>';
        } else {
          // standing is the maker's own active quote → waiting on taker
          action = '<p class="waiting">Quote standing at <b>' + totalLabel(r, standing.price) + '</b> (' + unitLabel(standing.price) + ') — waiting for the taker to accept or counter.</p>';
        }

        return head + summary + (rows ? '<div class="thread-list">' + rows + '</div>' : '') + '<div style="margin-top:18px;">' + action + '</div>';
      }

      // ---- event wiring (delegated; panels are rebuilt on render) ----
      document.body.addEventListener('click', function (e) {
        var el = e.target.closest('[data-action]');
        if (!el) return;
        var a = el.getAttribute('data-action');
        if (a === 'set-role') setRole(el.getAttribute('data-role'));
        else if (a === 'get-quote') requestRfq('quote');
        else if (a === 'request-order') requestRfq('order');
        else if (a === 'new-rfq') reset();
        else if (a === 'escalate') escalateOrder();
        else if (a === 'accept') accept(el.getAttribute('data-id'));
        else if (a === 'open-counter') { state.counterFor = el.getAttribute('data-maker'); render(); }
        else if (a === 'send-counter') takerCounter(el.getAttribute('data-maker'));
        else if (a === 'reset') reset();
        else if (a === 'refresh') refresh();
        else if (a === 'select-rfq') selectRfq(el.getAttribute('data-id'));
        else if (a === 'maker-back') makerBack();
        else if (a === 'maker-submit') makerSubmit();
        else if (a === 'maker-accept') makerAcceptCounter(el.getAttribute('data-id'));
        else if (a === 'use-oracle') useOraclePrice();
      });

      // Maker accepts the Oracle's fair price → fill the total input with it
      function useOraclePrice() {
        if (!state.rfq) return;
        var mt = makerTokenOf(state.rfq), tt = takerTokenOf(state.rfq);
        var fairTotal = payAmount(makerAmountOf(state.rfq), oracle.mid, mt);
        state.makerPriceDraft = String(Number(fairTotal.toFixed(tokDp(tt))));
        render();
      }

      document.body.addEventListener('input', function (e) {
        var id = e.target.id;
        if (id === 'nameInput') setName(e.target.value);
        else if (id === 'amountInput') state.amount = e.target.value;
        else if (id === 'makerPrice') { state.makerPriceDraft = e.target.value; refreshHint(); }
        else if (id && id.indexOf('counter-') === 0) state.drafts[id.slice(8)] = e.target.value;
      });
      document.body.addEventListener('change', function (e) {
        if (e.target.id === 'makerTtl') state.makerTtl = e.target.value;
        else if (e.target.id === 'makerTokenSel') setMakerToken(e.target.value);
        else if (e.target.id === 'takerTokenSel') setTakerToken(e.target.value);
      });
      // live bps hint under maker price without rebuilding the input
      function refreshHint() {
        var inp = document.getElementById('makerPrice'); if (!inp || !state.rfq) return;
        var hint = inp.parentNode.querySelector('.field__hint');
        var mt = makerTokenOf(state.rfq);
        var total = parsePrice(state.makerPriceDraft);          // draft is the total
        var p = priceFromTotal(total, makerAmountOf(state.rfq), mt);
        var html = p > 0 ? unitLabel(p) + ' · ' + fmtBps(oracle.bps(p, state.rfq.side)) + ' vs oracle' : '';
        if (!hint && p > 0) { hint = document.createElement('div'); hint.className = 'field__hint'; inp.parentNode.appendChild(hint); }
        if (hint) hint.innerHTML = html;
      }

      // ---- boot ----
      if (!state.address) { state.address = genAddress(); store.set('rfq_address', state.address); }
      setInterval(tick, 1000);
      if (state.role === 'maker') mountMaker(); else render();
    })();
  </script>
</body>
</html>
